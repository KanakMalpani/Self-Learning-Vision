version: 2
updates:
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      python-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: npm
    directories:
      - /apps/web
      - /apps/desktop
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      javascript-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      rust-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      action-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
