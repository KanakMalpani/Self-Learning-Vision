name: Desktop Alpha Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-alpha.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_slug }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_slug: windows-x64
            sidecar_target: windows-x64
          - os: macos-15-intel
            artifact_slug: macos-x64
            sidecar_target: macos-x64
          - os: macos-latest
            artifact_slug: macos-arm64
            sidecar_target: macos-arm64
          - os: ubuntu-22.04
            artifact_slug: linux-x64
            sidecar_target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements-desktop.txt
            apps/api/constraints.txt

      - name: Install desktop backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements-desktop.txt -c apps/api/constraints.txt

      - name: Run backend tests
        working-directory: apps/api
        run: pytest -q --basetemp .pytest_tmp

      - name: Build API sidecar
        run: python scripts/build_desktop_sidecar.py --target ${{ matrix.sidecar_target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Verify frontend
        working-directory: apps/web
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build:desktop

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Install Linux Tauri system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri bundle
        working-directory: apps/desktop
        run: npm run build

      - name: Scan artifact staging
        shell: bash
        run: |
          if find apps/desktop/src-tauri/target/release/bundle \
            \( -name "*.env" -o -name "*.db" -o -name "*.sqlite" -o -name "*.log" -o -name "*.pyc" \) \
            -print | grep .; then
            echo "Unsafe artifact content detected"
            exit 1
          fi

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-learning-vision-${{ matrix.artifact_slug }}
          path: apps/desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate checksums
        run: |
          cd release-artifacts
          find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          body: |
            Unsigned desktop alpha for Self-Learning Vision.

            Windows and macOS may show unknown-publisher warnings because this alpha is not code-signed yet.
            Verify downloads with SHA256SUMS.txt.
          files: |
            release-artifacts/**
