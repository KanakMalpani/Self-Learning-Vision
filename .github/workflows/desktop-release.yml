name: Desktop Alpha Release

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/desktop-release.yml"
      - "apps/api/**"
      - "apps/desktop/**"
      - "apps/web/**"
      - "docs/download.md"
      - "docs/install/**"
      - "scripts/**"
  push:
    tags:
      - "v*-alpha.*"

concurrency:
  group: desktop-alpha-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact_slug }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_slug: windows-x64
            sidecar_target: windows-x64
          - os: macos-15-intel
            artifact_slug: macos-x64
            sidecar_target: macos-x64
          - os: macos-latest
            artifact_slug: macos-arm64
            sidecar_target: macos-arm64
          - os: ubuntu-22.04
            artifact_slug: linux-x64
            sidecar_target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements-desktop.txt
            apps/api/constraints.txt

      - name: Install desktop backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements-desktop.txt -c apps/api/constraints.txt

      - name: Verify tag matches packaged desktop version
        if: startsWith(github.ref, 'refs/tags/')
        run: python scripts/release_artifacts.py verify-tag --tag "${{ github.ref_name }}"

      - name: Test release artifact tooling
        run: python -m unittest discover -s scripts/tests -p "test_*.py"

      - name: Run backend tests
        working-directory: apps/api
        run: pytest -q --basetemp .pytest_tmp

      - name: Build API sidecar
        run: python scripts/build_desktop_sidecar.py --target ${{ matrix.sidecar_target }}

      - name: Smoke-test native frozen sidecar
        run: python scripts/smoke_desktop_sidecar.py --target ${{ matrix.sidecar_target }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Verify frontend
        working-directory: apps/web
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build:desktop

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Install Linux Tauri system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri bundle
        working-directory: apps/desktop
        run: npm run build

      - name: Stage named release artifacts
        run: python scripts/stage_desktop_artifacts.py --platform ${{ matrix.artifact_slug }}

      - name: Validate staged release artifacts
        run: python scripts/release_artifacts.py validate-platform --platform ${{ matrix.artifact_slug }} --directory artifacts/desktop

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: self-learning-vision-${{ matrix.artifact_slug }}
          path: artifacts/desktop/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Validate complete release set
        run: python scripts/release_artifacts.py validate-release --directory release-artifacts

      - name: Generate checksums
        run: python scripts/release_artifacts.py checksums --directory release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          body: |
            Unsigned desktop alpha for Self-Learning Vision.

            Windows and macOS may show unknown-publisher warnings because this alpha is not code-signed yet.
            The Windows setup installer includes the WebView2 bootstrapper. The Windows portable ZIP requires WebView2 already installed.
            Desktop data remains local in the operating system app-data directory.
            Verify downloads with SHA256SUMS.txt.
          files: |
            release-artifacts/*
