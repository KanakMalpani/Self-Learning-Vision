name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/constraints.txt
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt -c apps/api/constraints.txt
      - name: Test backend
        working-directory: apps/api
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend
        working-directory: apps/web
        run: npm ci
      - name: Lint frontend
        working-directory: apps/web
        run: npm run lint
      - name: Test frontend
        working-directory: apps/web
        run: npm test
      - name: Typecheck frontend
        working-directory: apps/web
        run: npm run typecheck
      - name: Build frontend
        working-directory: apps/web
        run: npm run build
      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke test
        working-directory: apps/web
        run: npm run test:e2e

  public-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test release artifact tooling
        run: python -m unittest discover -s scripts/tests -p "test_*.py"
      - name: Scan for release artifacts
        run: |
          artifacts="$(find . \( -name "*.env" -o -name "*.db" -o -name "*.sqlite" -o -name "*.npy" -o -name "*.pyc" -o -name "*.log" \) -print)"
          if [ -n "$artifacts" ]; then
            echo "$artifacts"
            exit 1
          fi
      - name: Scan for obvious secrets
        run: |
          pattern='s[k]-[A-Za-z0-9]|AI[z]a|g[h]p_|github_[p]at|BEGIN (RSA|OPENSSH|PRIVATE)|[A-Z0-9_]+_API[_]KEY[[:space:]]*='
          ! grep -RInE "$pattern" . --exclude-dir=.git --exclude=package-lock.json
